<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Formulário Responsivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5 p-4 bg-white rounded shadow-sm" style="max-width: 800px;">
        <h2 class="mb-4 text-primary">Cadastro de Usuário</h2>
        
        <form>
            <div class="row g-3">
                <div class="col-8">
                    <label for="nome" class="form-label fw-bold">Nome completo</label>
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
                </div>
                <div class="col-4">
                    <label for="cpf" class="form-label fw-bold">CPF</label>
                    <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00">
                </div>
                
                <div class="col-12 col-md-6">
                    <label for="email" class="form-label fw-bold">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="exemplo@email.com">
                </div>
                <div class="col-12 col-md-6">
                    <label for="telefone" class="form-label fw-bold">Telefone</label>
                    <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                </div>
                
                <div class="col-12">
                    <label for="endereco" class="form-label fw-bold">Endereço</label>
                    <input type="text" class="form-control" id="endereco" placeholder="Rua, número, bairro">
                </div>
                
                <div class="col-12 col-md-6">
                    <label for="cidade" class="form-label fw-bold">Cidade</label>
                    <input type="text" class="form-control" id="cidade">
                </div>
                <div class="col-12 col-md-4">
                    <label for="estado" class="form-label fw-bold">Estado</label>
                    <select id="estado" class="form-select">
                        <option selected>Selecione...</option>
                        <option>Minas Gerais</option>
                        <option>São Paulo</option>
                        <option>Rio de Janeiro</option>
                    </select>
                </div>
                <div class="col-12 col-md-2">
                    <label for="cep" class="form-label fw-bold">CEP</label>
                    <input type="text" class="form-control" id="cep" placeholder="00000-000">
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Cadastrar</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
